name: Update Data & Deploy

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'pipeline/**'
      - '.github/workflows/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore pipeline ops cache
        uses: actions/cache@v4
        with:
          path: pipeline/ops_cache
          key: ops-cache-${{ runner.os }}-v2
          restore-keys: |
            ops-cache-${{ runner.os }}-v2
            ops-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run root algorithm pipeline (generates PEM cache)
        run: python pipeline/fetch_root_algo.py

      - name: Run market/trust pipeline (reads PEM cache for cert viewer)
        run: python pipeline/fetch_and_join.py

      - name: Run browser share pipeline
        run: python pipeline/fetch_browser_share.py

      - name: Run incident pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/fetch_incidents.py

      - name: Run Microsoft CTL changelog pipeline
        continue-on-error: true
        run: python pipeline/fetch_microsoft_ctl.py

      - name: Run Chrome Root Store changelog pipeline
        continue-on-error: true
        run: python pipeline/fetch_chrome_root_store.py

      - name: Run daily trust store snapshot
        continue-on-error: true
        run: python pipeline/fetch_trust_snapshots.py

      - name: Run governance risk pipeline
        continue-on-error: true
        run: python pipeline/fetch_rpe.py

      - name: Run community engagement pipeline
        continue-on-error: true
        run: python pipeline/fetch_community.py

      - name: Export LLM snapshot (initial)
        run: python pipeline/export_llm_snapshot.py

      - name: Generate tab intro text
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/fetch_tab_intros.py

      - name: Export LLM snapshot (final, includes tab intros)
        run: python pipeline/export_llm_snapshot.py

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save generated data to temp (before any git operations)
          mkdir -p /tmp/pipeline-data
          cp -r data/* /tmp/pipeline-data/
          cp pipeline/algo_cache.json /tmp/algo_cache.json 2>/dev/null || true
          cp pipeline/pem_cache.json /tmp/pem_cache.json 2>/dev/null || true
          # Reset working tree, pull latest
          git checkout -- . 2>/dev/null || true
          git clean -fd data/ 2>/dev/null || true
          git pull origin main --rebase || true
          # Restore generated outputs
          cp -r /tmp/pipeline-data/* data/
          cp /tmp/algo_cache.json pipeline/algo_cache.json 2>/dev/null || true
          cp /tmp/pem_cache.json pipeline/pem_cache.json 2>/dev/null || true
          # Stage and commit data outputs only — ops_cache lives in Actions cache, not git
          git add data/ pipeline/algo_cache.json pipeline/pem_cache.json
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "Update WebPKI data $(date -u +%Y-%m-%d)"
            git push origin main
          fi

  build:
    needs: update-data
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate UI bundle
        env:
          PIPELINE_DATA_DIR: ${{ github.workspace }}/data
          PIPELINE_DIR: ${{ github.workspace }}/pipeline
        run: python pipeline/export_ui_bundle.py

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Build
        working-directory: app
        env:
          PIPELINE_DATA_DIR: ${{ github.workspace }}/data
          PIPELINE_DIR: ${{ github.workspace }}/pipeline
        run: |
          npm run build
          mkdir -p dist/data
          cp -r ${{ github.workspace }}/data/ca dist/data/ca
          cp ${{ github.workspace }}/data/llm_snapshot.json dist/llm_snapshot.json

      - name: Inject SEO content
        env:
          PIPELINE_DATA_DIR: ${{ github.workspace }}/data
          DIST_DIR: ${{ github.workspace }}/app/dist
        run: python pipeline/generate_seo.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
